project:
  name: EduLakehouse
  version: 1.0.0
  environment: dev

paths:
  landing: data/landing
  bronze: data/bronze
  silver: data/silver
  gold: data/gold
  logs: logs

logging:
  level: INFO
  format: "%(asctime)s | %(levelname)s | %(message)s"

pipeline:
  retries: 3
  timeout: 600
  repartitions: 4

debug:
  show_schema: true
  show_sample: true
  show_nulls: true

save:
  audit: true
  quality: true
  metrics: true

quality:
  fail_on_nulls: true
  fail_on_duplicates: true