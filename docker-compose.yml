# Bloco compartilhado entre os serviços Airflow
x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "${AIRFLOW_FERNET_KEY:-}"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__LOGGING_LEVEL: INFO
    PYTHONPATH: /opt/airflow
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./data:/opt/airflow/data
    - ./pipelines:/opt/airflow/pipelines
    - ./framework:/opt/airflow/framework
    - ./config:/opt/airflow/config
  depends_on:
    postgres:
      condition: service_healthy
  restart: unless-stopped

services:

  ###############################################################
  # BANCO DE DADOS — Metadados do Airflow
  ###############################################################
  postgres:
    image: postgres:15
    container_name: edulakehouse-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ###############################################################
  # AIRFLOW — Inicialização do banco
  ###############################################################
  airflow-init:
    <<: *airflow-common
    container_name: edulakehouse-airflow-init
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create
          --username admin
          --password admin
          --firstname Admin
          --lastname User
          --role Admin
          --email admin@edulakehouse.com
      "
    restart: "no"

  ###############################################################
  # AIRFLOW — Webserver (UI)
  ###############################################################
  airflow-webserver:
    <<: *airflow-common
    container_name: edulakehouse-airflow-webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  ###############################################################
  # AIRFLOW — Scheduler
  ###############################################################
  airflow-scheduler:
    <<: *airflow-common
    container_name: edulakehouse-airflow-scheduler
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  ###############################################################
  # MINIO — Object Storage (compatível com S3)
  ###############################################################
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: edulakehouse-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minio123}
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
